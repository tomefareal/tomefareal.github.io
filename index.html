<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night Bell - Sonnerie</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fbff, #eaf3ff);
      color: #1f2a37;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 0 26px 32px;
      box-shadow: 0 10px 30px rgba(61, 92, 139, 0.12);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.7);
      overflow: hidden;
    }

    .banner {
      height: 120px;
      background: linear-gradient(135deg, #6aa9ff, #8fd3ff);
      margin: 0 -26px 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.2);
    }

    .title {
      font-size: 28px;
      margin-bottom: 10px;
      color: #23415f;
      font-weight: 700;
    }

    .subtitle {
      font-size: 15px;
      color: #5b6b7a;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .download-btn {
      display: inline-block;
      padding: 14px 26px;
      background: linear-gradient(135deg, #6aa9ff, #8fd3ff);
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      box-shadow: 0 8px 18px rgba(106, 169, 255, 0.28);
      transition: all 0.25s ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(106, 169, 255, 0.35);
      background: linear-gradient(135deg, #5b9bff, #78c9ff);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #7a8794;
    }

    audio {
      width: 100%;
      margin-top: 18px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="banner">Tomefa real</div>

    <div class="title">Night Bell</div>
    <div class="subtitle">
      Clique sur le bouton ci-dessous pour télécharger la sonnerie MP3.
    </div>

    <audio controls>
      <source src="night-bell.mp3" type="audio/mpeg" />
      Ton navigateur ne supporte pas l’audio.
    </audio>

    <br><br>

    <a class="download-btn" href="night-bell.mp3" download="night-bell.mp3">
      Télécharger la sonnerie
    </a>

    <div class="note">Fichier : night-bell.mp3</div>
  </div>
</body>
</html>
